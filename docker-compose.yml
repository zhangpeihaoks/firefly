version: '3.8'

services:
  firefly:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./config:/app/config
    networks:
      - firefly-network
    depends_on:
      - redis
      - consul

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - firefly-network

  consul:
    image: consul:1.15
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    networks:
      - firefly-network

  jaeger:
    image: jaegertracing/all-in-one:1.50
    ports:
      - "16686:16686"
      - "14268:14268"
    networks:
      - firefly-network

  prometheus:
    image: prom/prometheus:v2.45.0
    ports:
      - "9091:9090"
    volumes:
      - ./tool/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - firefly-network

  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - firefly-network

networks:
  firefly-network:
    driver: bridge
