name: Release

on:
  push:
    tags:
      - "v*"

env:
  GO_VERSION: "1.26"

jobs:
  # ── Binary Release ─────────────────────────────────────
  binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o firefly main.go
          tar czf firefly_${GOOS}_${GOARCH}.tar.gz firefly
          sha256sum firefly_${GOOS}_${GOARCH}.tar.gz > firefly_${GOOS}_${GOARCH}.tar.gz.sha256

      - uses: actions/upload-artifact@v7
        with:
          name: firefly-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            firefly_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
            firefly_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz.sha256

  # ── GitHub Release ─────────────────────────────────────
  release:
    name: Create Release
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Changelog
        run: |
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --oneline > CHANGELOG.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: CHANGELOG.txt
          generate_release_notes: true

  # ── Docker Image ───────────────────────────────────────
  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
